name: mcp-server

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
      - ".github/workflows/mcp-server.yml"
    tags:
      - "mcp-server-v*"
  pull_request:
    paths:
      - "mcp-server/**"
      - ".github/workflows/mcp-server.yml"

defaults:
  run:
    working-directory: mcp-server

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    # Only runs on tags shaped like `mcp-server-vX.Y.Z`, so other repo
    # tags don't accidentally trigger a publish. The version inside
    # package.json must match the tag for npm publish to behave;
    # we don't check that here — npm will reject the publish if the
    # version is already taken.
    needs: test
    if: startsWith(github.ref, 'refs/tags/mcp-server-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
